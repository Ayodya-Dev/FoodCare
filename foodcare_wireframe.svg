        <text x="15" y="120" class="cell-text" font-weight="600">Ayodya Sasanka</text>
        <text x="150" y="120" class="cell-text">mango</text>
        <rect x="280" y="107" width="80" height="18" rx="9" fill="#F3F4F6"/>
        <text x="305" y="120" class="badge-txt" fill="#4B5563">Closed</text>
        <text x="390" y="120" class="cell-text">2026-07-08</text>
        <text x="490" y="120" class="cell-text">2026-07-08</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" style="background:#F3F4F6; font-family:'Inter', sans-serif;">
  <!-- DEFINITIONS & STYLES -->
  <defs>

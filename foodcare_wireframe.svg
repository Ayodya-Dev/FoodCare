    <rect width="880" height="480" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
    <!-- Browser Header Bar -->
    <rect width="880" height="40" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
    <!-- Close, Min, Max buttons -->
    <circle cx="20" cy="20" r="6" fill="#EF4444"/>
    <circle cx="36" cy="20" r="6" fill="#FBBF24"/>
    <circle cx="52" cy="20" r="6" fill="#10B981"/>
    <!-- URL bar mockup -->

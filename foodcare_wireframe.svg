      .btn-txt { font-size: 13px; font-weight: 600; fill: #FFFFFF; }
      .nav-txt { font-size: 14px; font-weight: 500; fill: #4B5563; }
      .nav-txt-act { font-size: 14px; font-weight: 600; fill: #FF7A1A; }
